  <!-- Cap body visible below board -->
  <path d="M12 16 L12 24 Q20 30 28 24 L28 16" fill="#162d52" fill-opacity="0.86" stroke="white" stroke-width="0.9"/>
  <!-- Tassel cord from right vertex -->
  <line x1="35" y1="15" x2="35" y2="27" stroke="#facc15" stroke-width="1.7" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="35" cy="29" r="2.2" fill="#facc15"/>
</svg>
